services:
  - type: web
    name: axonai-rehab-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements-rehab-cloud.txt
    startCommand: uvicorn axonai_rehab_cloud_app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AXONAI_UPLOAD_ROOT
        value: /tmp/axonai/uploads/upper_limb_package
      - key: AXONAI_KEEP_UPLOADED_VIDEOS
        value: "false"
      - key: AXONAI_OBJECT_STORAGE_BUCKET
        sync: false
      - key: AXONAI_OBJECT_STORAGE_ENDPOINT_URL
        sync: false
      - key: AXONAI_OBJECT_STORAGE_REGION
        sync: false
      - key: AXONAI_OBJECT_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: AXONAI_OBJECT_STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: AXONAI_OBJECT_STORAGE_PUBLIC_BASE_URL
        sync: false
