services:
  - type: web
    name: axonai-rehab-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements-rehab-cloud.txt
    startCommand: uvicorn axonai_rehab_cloud_app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: AXONAI_REHAB_DB_PATH
        value: /var/data/axonai_rehab.sqlite3
      - key: AXONAI_UPLOAD_ROOT
        value: /var/data/uploads/upper_limb_package
      - key: AXONAI_KEEP_UPLOADED_VIDEOS
        value: "false"
    disk:
      name: axonai-rehab-data
      mountPath: /var/data
      sizeGB: 5

